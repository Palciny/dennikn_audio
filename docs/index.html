<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self'; media-src https://a-static.projektn.sk; img-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'" />
  <meta name="referrer" content="no-referrer" />
  <title>Denník N Audio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>Denník N Audio</h1>
      <p>Statický prehrávač MP3 článkov, aktualizovaný každý deň zo všetkých článkových RSS feedov Denníka N.</p>
      <div class="meta" id="meta">Načítavam…</div>
    </header>

    <section class="toolbar">
      <input id="search" type="search" placeholder="Filtrovať podľa názvu článku…" />
      <select id="day-filter" aria-label="Filtrovať podľa dňa publikovania"></select>
      <select id="category-filter" aria-label="Filtrovať podľa kategórie"></select>
      <select id="speed-control" aria-label="Rýchlosť prehrávania">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="1.75">1.75×</option>
        <option value="2">2×</option>
      </select>
      <button id="reset-filters" type="button">Zrušiť filtre</button>
    </section>

    <section id="list" class="list"></section>
  </main>

  <template id="card-template">
    <article class="card">
      <h2 class="title"></h2>
      <div class="details"></div>
      <div class="chips"></div>
      <div class="links">
        <a class="article-link" target="_blank" rel="noopener noreferrer">Článok</a>
        <a class="mp3-link" target="_blank" rel="noopener noreferrer">MP3</a>
        <span class="speed-label">Rýchlosť: <span class="speed-value">1×</span></span>
      </div>
      <div class="player-row">
        <audio controls preload="none"></audio>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
